# Meson cross file for MinGW-w64 Windows targets.
# Usage: meson setup build-win --cross-file cross/mingw-w64.ini

[host_machine]
system = 'windows'
cpu_family = 'x86_64'
cpu = 'x86_64'
endian = 'little'

[binaries]
c = 'x86_64-w64-mingw32-gcc'
cpp = 'x86_64-w64-mingw32-g++'
vala = 'valac'
pkgconfig = 'pkg-config'
exe_wrapper = 'wine'
